<mat-card class="glass-card rfid-card">
  <mat-card-title>Access Control (RFID)</mat-card-title>
  <table mat-table [dataSource]="rfidLogs" class="rfid-table">
    <ng-container matColumnDef="cardId">
      <th mat-header-cell *matHeaderCellDef>Card ID</th>
      <td mat-cell *matCellDef="let entry">{{ entry.cardId }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let entry">
        <span
          class="status-pill"
          [ngClass]="isAccessGranted(entry.status) ? 'status-success' : 'status-danger'"
        >
          {{ entry.status }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="type">
      <th mat-header-cell *matHeaderCellDef>Type</th>
      <td mat-cell *matCellDef="let entry">{{ entry.type || '—' }}</td>
    </ng-container>

    <ng-container matColumnDef="timestamp">
      <th mat-header-cell *matHeaderCellDef>Timestamp</th>
      <td mat-cell *matCellDef="let entry">{{ entry.timestamp | date:'short' }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</mat-card>
