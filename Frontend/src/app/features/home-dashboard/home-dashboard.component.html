<section class="dashboard-page page">
  <header class="page-header">
    <div>
      <h1 class="page-title">Home Dashboard</h1>
      <p class="page-subtitle">Humidity, rain, and CO2 sensor readings.</p>
    </div>
  </header>

  <section class="summary-cards">
    <h2>Summary</h2>
    <div class="cards-grid">
      <app-summary-card
        *ngIf="co2Latest$ | async as reading"
        [label]="'CO2'"
        [value]="reading.value"
        [status]="'normal'"
      ></app-summary-card>
      <app-summary-card
        *ngIf="humidityLatest$ | async as reading"
        [label]="'Humidity'"
        [value]="reading.value"
        [status]="'normal'"
      ></app-summary-card>
      <app-summary-card
        *ngIf="rainLatest$ | async as reading"
        [label]="'Rain'"
        [value]="reading.value"
        [status]="'normal'"
      ></app-summary-card>
    </div>
  </section>

  <section class="environmental-sensors">
    <h2>Environmental Sensors</h2>
    <div class="sensor-charts">
      <app-reading-chart
        *ngIf="co2Readings$ | async as readings"
        [readings]="readings"
        [title]="'CO2 (ppm)'"
      ></app-reading-chart>
      <app-reading-chart
        *ngIf="humidityReadings$ | async as readings"
        [readings]="readings"
        [title]="'Humidity (%)'"
      ></app-reading-chart>
      <app-reading-chart
        *ngIf="rainReadings$ | async as readings"
        [readings]="readings"
        [title]="'Rain (mm)'"
      ></app-reading-chart>
    </div>
  </section>

  <app-rfid-table [rfidLogs]="(rfidLogs$ | async) ?? []"></app-rfid-table>
</section>
